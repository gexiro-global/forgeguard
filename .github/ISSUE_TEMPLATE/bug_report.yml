name: Bug report
description: Report a reproducible ForgeGuard issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: authorization
    attributes:
      label: Authorization
      options:
        - label: I confirm this concerns my own or an authorized instance.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use synthetic or redacted details only.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ForgeGuard version
    validations:
      required: true
